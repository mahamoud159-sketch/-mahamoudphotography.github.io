<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#1a1814"/>

  <!-- Outer aperture ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#c9a96e" stroke-width="3" opacity="0.5"/>
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="188" fill="none" stroke="#c9a96e" stroke-width="4" opacity="0.8"/>
  <!-- Inner filled circle -->
  <circle cx="256" cy="256" r="154" fill="#1a1814" stroke="#c9a96e" stroke-width="2" opacity="0.4"/>

  <!-- Aperture blades -->
  <g transform="translate(256,256)">
    <path d="M0,-154 L-40,-80 L0,-51 L40,-80 Z" fill="#2c2820" stroke="#c9a96e" stroke-width="1.5" opacity="0.9"/>
    <path d="M0,-154 L-40,-80 L0,-51 L40,-80 Z" fill="#2c2820" stroke="#c9a96e" stroke-width="1.5" opacity="0.9" transform="rotate(60)"/>
    <path d="M0,-154 L-40,-80 L0,-51 L40,-80 Z" fill="#2c2820" stroke="#c9a96e" stroke-width="1.5" opacity="0.9" transform="rotate(120)"/>
    <path d="M0,-154 L-40,-80 L0,-51 L40,-80 Z" fill="#2c2820" stroke="#c9a96e" stroke-width="1.5" opacity="0.9" transform="rotate(180)"/>
    <path d="M0,-154 L-40,-80 L0,-51 L40,-80 Z" fill="#2c2820" stroke="#c9a96e" stroke-width="1.5" opacity="0.9" transform="rotate(240)"/>
    <path d="M0,-154 L-40,-80 L0,-51 L40,-80 Z" fill="#2c2820" stroke="#c9a96e" stroke-width="1.5" opacity="0.9" transform="rotate(300)"/>
    <!-- Center hole -->
    <circle cx="0" cy="0" r="46" fill="#1a1814"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#c9a96e" stroke-width="3" opacity="0.7"/>
  </g>

  <!-- M Monogram in gold -->
  <g transform="translate(256,256)">
    <rect x="-46" y="-40" width="10" height="80" fill="#c9a96e"/>
    <rect x="36" y="-40" width="10" height="80" fill="#c9a96e"/>
    <polygon points="-46,-40 -36,-40 0,12 -10,12" fill="#c9a96e"/>
    <polygon points="46,-40 36,-40 0,12 10,12" fill="#c9a96e"/>
  </g>

  <!-- Tick marks at cardinal points -->
  <g transform="translate(256,256)">
    <line x1="0" y1="-220" x2="0" y2="-200" stroke="#c9a96e" stroke-width="4" opacity="0.9"/>
    <line x1="0" y1="-220" x2="0" y2="-200" stroke="#c9a96e" stroke-width="4" opacity="0.9" transform="rotate(90)"/>
    <line x1="0" y1="-220" x2="0" y2="-200" stroke="#c9a96e" stroke-width="4" opacity="0.9" transform="rotate(180)"/>
    <line x1="0" y1="-220" x2="0" y2="-200" stroke="#c9a96e" stroke-width="4" opacity="0.9" transform="rotate(270)"/>
  </g>
</svg>
